name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        default: v0.1.0-debug
      prerelease:
        description: Mark release as prerelease
        required: true
        default: "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Locate debug APK
        id: apk
        shell: bash
        run: |
          apk_path="$(find . -path '*/build/outputs/apk/debug/*.apk' -type f | head -n 1)"
          if [[ -z "$apk_path" ]]; then
            echo "No debug APK found" >&2
            exit 1
          fi
          mkdir -p release
          cp "$apk_path" release/AudOneOut-debug.apk
          echo "path=release/AudOneOut-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: AudOneOut ${{ steps.release.outputs.tag }}
          body: |
            Debug APK for AudOneOut.

            This APK is intended for device testing and is not a Play Store production signing artifact.
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true' || true }}
          files: ${{ steps.apk.outputs.path }}

